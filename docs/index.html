<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HN Insights - 洞察报告</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11"></script>
</head>
<body>
    <div id="app">
        <header>
            <h1>HN Insights</h1>
            <p class="subtitle">Hacker News 洞察报告</p>
        </header>
        
        <main>
            <div id="list-view">
                <div id="post-list" class="loading">加载中...</div>
                <div id="pagination" class="hidden">
                    <button id="prev-btn" class="page-btn">上一页</button>
                    <span id="page-info"></span>
                    <button id="next-btn" class="page-btn">下一页</button>
                </div>
            </div>
            
            <div id="detail-view" class="hidden">
                <article id="post-content"></article>
            </div>
        </main>
        
        <footer>
            <p>Powered by GitHub Pages</p>
        </footer>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
